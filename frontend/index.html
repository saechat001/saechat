<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SaeChat — simple (real-time)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,Segoe UI,Arial;background:#0f172a;color:#fff;margin:0;padding:16px}
    .card{background:#111827;padding:12px;border-radius:8px;margin-bottom:12px}
    input,textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #334155;background:#0b1220;color:#fff}
    button{background:#fff;color:#0f172a;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
    img.post{max-width:100%;border-radius:6px;margin-top:8px}
    .tabs{display:flex;gap:8px;margin-bottom:12px}
    .tab{padding:6px 10px;border-radius:8px;background:#0b1220;cursor:pointer}
    .active{background:#06b6d4;color:#012}
    .messages{height:300px;overflow:auto;border-radius:8px;padding:8px;background:#0b1220}
    .msg{margin-bottom:6px;padding:6px;border-radius:6px}
    .mine{background:#064e3b;text-align:right}
    .theirs{background:#111827;text-align:left}
  </style>
</head>
<body>
  <h1>SaeChat (simple)</h1>

  <div id="auth" class="card">
    <h3>Register / Login</h3>
    <input id="email" placeholder="email" />
    <input id="username" placeholder="username (for register)" />
    <input id="password" type="password" placeholder="password" />
    <div style="display:flex;gap:8px">
      <button id="btnRegister">Register</button>
      <button id="btnLogin">Login</button>
    </div>
    <div id="authMsg"></div>
  </div>

  <div id="ui" style="display:none">
    <div class="tabs">
      <div id="tabFeed" class="tab active">Feed</div>
      <div id="tabMessages" class="tab">Messages</div>
      <div id="tabProfile" class="tab">Profile</div>
    </div>

    <div id="feedView">
      <div class="card">
        <h3>Create post</h3>
        <textarea id="postText" placeholder="Say something..."></textarea>
        <input id="postImage" type="file" />
        <button id="btnPost">Post</button>
      </div>
      <div id="feed"></div>
    </div>

    <div id="messagesView" style="display:none">
      <div class="card">
        <h3>Messages</h3>
        <input id="msgTo" placeholder="Recipient userId (copy from profile)" />
        <div class="messages" id="messagesList"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="msgText" placeholder="Type a message..." />
          <button id="btnSendMsg">Send</button>
        </div>
      </div>
    </div>

    <div id="profileView" style="display:none">
      <div class="card">
        <h3>Your profile</h3>
        <div id="myProfile"></div>
        <button id="btnLogout">Logout</button>
      </div>
    </div>
  </div>

  <!-- Socket.io client CDN -->
  <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>

<script>
/*
  Simple frontend for SaeChat
  - Paste backend URL when prompted (e.g., https://saechat-backend.username.repl.co)
  - Stores token in localStorage
  - Connects to backend via Socket.io for real-time messages
*/

const API_BASE = prompt("Paste backend URL (example: https://your-backend-url)") || location.origin;
let socket = null;

// small helper for API calls (adds Authorization if token present)
async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  const token = localStorage.getItem('token');
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, opts);
  return res.json();
}

// --- Auth UI handlers ---
document.getElementById('btnRegister').onclick = async () => {
  const email = document.getElementById('email').value;
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const r = await api('/api/auth/register', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ email, username, password })
  });
  if (r.token) { localStorage.setItem('token', r.token); localStorage.setItem('userId', r.user.id); initAfterAuth(); }
  else document.getElementById('authMsg').innerText = r.error || JSON.stringify(r);
};

document.getElementById('btnLogin').onclick = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const r = await api('/api/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ email, password })
  });
  if (r.token) { localStorage.setItem('token', r.token); localStorage.setItem('userId', r.user.id); initAfterAuth(); }
  else document.getElementById('authMsg').innerText = r.error || JSON.stringify(r);
};

// --- After login: connect socket, show UI ---
function initAfterAuth(){
  document.getElementById('auth').style.display = 'none';
  document.getElementById('ui').style.display = '';
  // connect socket to backend
  socket = io(API_BASE, { transports: ['websocket','polling'] });
  const myId = localStorage.getItem('userId');
  socket.on('connect', () => {
    // tell server we're online
    socket.emit('user-online', myId);
  });
  // receive real-time messages
  socket.on('receive-message', (m) => {
    // if conversation currently open with that user, show it.
    // we simply append to messagesList
    appendMessageToList(m);
  });

  // load profile and feed
  refreshProfile();
  refreshFeed();
}

// --- Posting ---
document.getElementById('btnPost').onclick = async () => {
  const txt = document.getElementById('postText').value;
  const file = document.getElementById('postImage').files[0];
  const form = new FormData();
  form.append('text', txt);
  if (file) form.append('image', file);
  const token = localStorage.getItem('token');
  await fetch(API_BASE + '/api/posts', { method:'POST', body: form, headers: { 'Authorization': 'Bearer ' + token } });
  document.getElementById('postText').value = '';
  document.getElementById('postImage').value = '';
  refreshFeed();
};

async function refreshFeed(){
  const feedEl = document.getElementById('feed');
  const posts = await api('/api/posts/feed');
  feedEl.innerHTML = posts.map(p => `
    <div class="card">
      <div style="font-weight:700">${escapeHtml(p.author?.username||'anon')}</div>
      <div>${escapeHtml(p.text||'')}</div>
      ${p.imageUrl ? `<img class="post" src="${API_BASE + p.imageUrl}" />` : ''}
      <div style="margin-top:8px"><button data-id="${p.id}" class="likeBtn">♡ ${p.likes?.length||0}</button></div>
    </div>
  `).join('');
  document.querySelectorAll('.likeBtn').forEach(b => b.onclick = async (e) => {
    const id = e.target.dataset.id;
    await api('/api/posts/' + id + '/like', { method: 'POST' }); refreshFeed();
  });
}

// --- Messages UI ---
document.getElementById('btnSendMsg').onclick = async () => {
  const to = document.getElementById('msgTo').value.trim();
  const text = document.getElementById('msgText').value.trim();
  if (!to || !text) return alert('Enter recipient userId and message text');
  // 1) persist message via API
  const saved = await api('/api/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ to, text }) });
  // 2) emit socket event to notify recipient in real time
  socket.emit('send-message', { toUserId: to, message: saved });
  appendMessageToList(saved, true);
  document.getElementById('msgText').value = '';
};

// Load conversation with a user
async function loadConvoWith(userId){
  document.getElementById('msgTo').value = userId;
  const msgs = await api('/api/messages/convo/' + userId);
  const list = document.getElementById('messagesList');
  list.innerHTML = '';
  msgs.forEach(m => appendMessageToList(m));
}

// Append message DOM (m = { id, from, to, text, createdAt })
function appendMessageToList(m, mine = false){
  const myId = localStorage.getItem('userId');
  const list = document.getElementById('messagesList');
  const div = document.createElement('div');
  div.className = 'msg ' + (m.from === myId ? 'mine' : 'theirs');
  div.innerText = (m.from === myId ? 'Me: ' : (m.from + ': ')) + m.text;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

// --- Profile & navigation ---
async function refreshProfile(){
  const profileEl = document.getElementById('myProfile');
  // we only have local userId and token; for demo we show the id
  profileEl.innerHTML = 'User id: ' + localStorage.getItem('userId') + ' (use this id to message others)';
}

// simple tabs
document.getElementById('tabFeed').onclick = () => { showTab('feed'); };
document.getElementById('tabMessages').onclick = () => { showTab('messages'); };
document.getElementById('tabProfile').onclick = () => { showTab('profile'); };

function showTab(t){
  document.getElementById('tabFeed').classList.remove('active');
  document.getElementById('tabMessages').classList.remove('active');
  document.getElementById('tabProfile').classList.remove('active');
  document.getElementById('feedView').style.display = 'none';
  document.getElementById('messagesView').style.display = 'none';
  document.getElementById('profileView').style.display = 'none';
  if(t==='feed'){ document.getElementById('tabFeed').classList.add('active'); document.getElementById('feedView').style.display = ''; }
  if(t==='messages'){ document.getElementById('tabMessages').classList.add('active'); document.getElementById('messagesView').style.display = ''; }
  if(t==='profile'){ document.getElementById('tabProfile').classList.add('active'); document.getElementById('profileView').style.display = ''; }
}

// Logout
document.getElementById('btnLogout').onclick = () => { localStorage.removeItem('token'); localStorage.removeItem('userId'); location.reload(); };

// If already logged in (token stored), init
if (localStorage.getItem('token')) initAfterAuth();

// small helper to avoid XSS in outputs
function escapeHtml(s){ return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>
</body>
</html>
